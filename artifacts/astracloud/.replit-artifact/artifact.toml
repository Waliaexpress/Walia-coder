kind = "web"
previewPath = "/astracloud/"
title = "AstraCloud Marketing Site"
version = "1.0.0"
id = "artifacts/astracloud"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/astracloud/" ]
localPort = 20092

[services.development]
run = "pnpm --filter @workspace/astracloud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astracloud", "run", "build" ]
publicDir = "artifacts/astracloud/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20092"
BASE_PATH = "/astracloud/"
